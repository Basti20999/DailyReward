# =============================================
#   DailyReward Configuration
#   Supports: hex colors (#RRGGBB) and legacy color codes (&a, &b, ...)
# =============================================

# Cooldown in hours before a player can claim again
cooldown_hours: 24

# ---- Reward values ----

# Money reward (random value between min and max)
money:
  min: 100
  max: 1000

# Key reward
keys:
  type: rare
  amount: 1

# Gem reward
gems: 250

# ---- Commands ----
# These commands are dispatched from the console when a player claims their reward.
# Placeholders: {player}, {amount}, {type}
# Leave a command blank ("") to skip it.
# Adjust these to match the economy/key/gem plugins on your server.
commands:
  money_give: "eco give {player} {amount}"
  keys_give: "crates key give {player} {type} {amount}"
  gems_give: "gems give {player} {amount}"

# ---- GUI settings ----
gui:
  title: "&8Daily Reward"
  size: 27         # Must be a multiple of 9 (9, 18, 27, 36, 45, 54)
  reward_slot: 13  # Slot index for the clickable reward item (0-based)

  # Material shown in the reward slot
  reward_material: CHEST

  # Item name when the reward is available
  reward_name_ready: "#00FF00&lCLAIM REWARD!"

  # Item name when the reward is on cooldown
  reward_name_cooldown: "#FF0000&lALREADY CLAIMED"

  # Lore lines shown on the reward item
  reward_lore:
    - "&f"
    - "#5555FF● &fRewards:"
    - "&f"
    - "&f- #00FF00$100 – $1,000 &7(random)"
    - "&f- 1x #00FF00&lRARE KEY"
    - "&f- #FF55FF250 Gems"
    - "&f"

  # Border decoration
  border_material: BLACK_STAINED_GLASS_PANE
  border_name: " "
  border_slots:
    - 0
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 8
    - 18
    - 19
    - 20
    - 21
    - 22
    - 23
    - 24
    - 25
    - 26

# ---- Messages ----
messages:
  general:
    only_players: "&cOnly players can use this command."
  success: "&aDailyReward &7» &fYou claimed your daily reward!"
  on_cooldown: "&cDailyReward &7» &fYou have already claimed your daily reward today!"

# ---- Sounds ----
sounds:
  open:
    sound: BLOCK_NOTE_BLOCK_PLING
    volume: 1.0
    pitch: 1.5
  success:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.0
  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0
